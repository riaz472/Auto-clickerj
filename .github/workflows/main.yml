name: Google Ad Clicker Runner

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'  # Har 3 ghante baad chalega

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt install -y ./google-chrome-stable_current_amd64.deb

      - name: Install System Dependencies
        run: |
          sudo apt-get install -y xvfb x11-utils libnss3 libatk-bridge2.0-0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libasound2t64 || sudo apt-get install -y libasound2 || true

      - name: Install Python Requirements
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          # Undetected chromedriver ka latest version ensure karne ke liye
          pip install undetected-chromedriver --upgrade

      - name: Run Ad Clicker with Virtual Display
        env:
          DISPLAY: :99
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 3
          # Aapka original command
          python ad_clicker.py --query "https://abr.ge/zz4y46"
